<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARENA KNOCKOUT 3D - Mars Mellow GC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080418;overflow:hidden;font-family:'Poppins',sans-serif;color:#fff;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

/* ===== CHARACTER SELECT SCREEN ===== */
#charSelect{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#080418 0%,#1a0a3e 40%,#0d0825 100%);z-index:200;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:1.5rem}
.cs-title{font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,#f472b6,#c084fc,#818cf8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:0.3rem;letter-spacing:3px;animation:titleGlow 3s ease-in-out infinite}
@keyframes titleGlow{0%,100%{filter:brightness(1) drop-shadow(0 0 10px rgba(192,132,252,0.3))}50%{filter:brightness(1.2) drop-shadow(0 0 25px rgba(192,132,252,0.6))}}
.cs-sub{color:#a78bfa;font-size:1rem;margin-bottom:1.5rem;letter-spacing:2px;text-align:center}
.cs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;width:100%;max-width:900px;margin-bottom:1.5rem}
.cs-card{background:linear-gradient(145deg,rgba(139,92,246,0.15),rgba(236,72,153,0.1));border:2px solid rgba(139,92,246,0.25);border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.cs-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(139,92,246,0.15),transparent,rgba(236,72,153,0.15),transparent);animation:cardSpin 6s linear infinite;opacity:0;transition:opacity 0.3s}
@keyframes cardSpin{100%{transform:rotate(360deg)}}
.cs-card:hover{transform:translateY(-6px) scale(1.04);border-color:rgba(139,92,246,0.6);box-shadow:0 15px 40px rgba(139,92,246,0.25)}
.cs-card:hover::before{opacity:1}
.cs-card.selected{border-color:#c084fc;background:linear-gradient(145deg,rgba(139,92,246,0.35),rgba(236,72,153,0.25));box-shadow:0 0 30px rgba(192,132,252,0.4),inset 0 0 20px rgba(192,132,252,0.1);transform:translateY(-6px) scale(1.06)}
.cs-card.selected::after{content:'✓';position:absolute;top:6px;right:8px;font-size:1.1rem;color:#a5f3fc;text-shadow:0 0 10px #22d3ee}
.cs-avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:2rem;background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(236,72,153,0.3));border:2px solid rgba(192,132,252,0.4);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.cs-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.cs-name{font-weight:700;font-size:0.85rem;color:#e2e8f0;letter-spacing:0.5px;margin-bottom:4px}
.cs-stats{display:flex;justify-content:center;gap:6px}
.cs-stat{font-size:0.6rem;color:#a78bfa;background:rgba(139,92,246,0.15);padding:2px 6px;border-radius:6px}
.cs-start{background:linear-gradient(135deg,#8b5cf6,#c084fc,#ec4899);border:none;color:white;padding:1rem 4rem;font-size:1.3rem;font-weight:800;border-radius:50px;cursor:pointer;letter-spacing:2px;transition:all 0.4s;text-transform:uppercase;font-family:'Orbitron',sans-serif;box-shadow:0 8px 30px rgba(139,92,246,0.4);margin-bottom:1rem}
.cs-start:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 15px 50px rgba(139,92,246,0.6)}
.cs-start:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;width:100%;padding:12px 18px;z-index:50;pointer-events:none;display:none}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start}
.hud-player{display:flex;align-items:center;gap:10px;background:rgba(10,4,30,0.85);border:1px solid rgba(139,92,246,0.3);border-radius:14px;padding:8px 14px;backdrop-filter:blur(8px)}
.hud-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:linear-gradient(135deg,rgba(139,92,246,0.4),rgba(236,72,153,0.3));border:2px solid #c084fc}
.hud-info{display:flex;flex-direction:column;gap:3px}
.hud-name{font-weight:700;font-size:0.85rem;color:#e2e8f0}
.hud-bar-bg{width:120px;height:8px;background:rgba(139,92,246,0.15);border-radius:4px;overflow:hidden;border:1px solid rgba(139,92,246,0.3)}
.hud-bar-fill{height:100%;border-radius:4px;transition:width 0.3s;background:linear-gradient(90deg,#8b5cf6,#c084fc)}
.hud-center{display:flex;flex-direction:column;align-items:center;gap:4px}
.hud-alive{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;color:#c084fc;text-shadow:0 0 20px rgba(192,132,252,0.5)}
.hud-alive-label{font-size:0.65rem;color:#a78bfa;letter-spacing:2px;text-transform:uppercase}
.hud-kills{background:rgba(10,4,30,0.85);border:1px solid rgba(236,72,153,0.3);border-radius:14px;padding:8px 14px;text-align:center;backdrop-filter:blur(8px)}
.hud-kills-num{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:#f472b6;text-shadow:0 0 15px rgba(244,114,182,0.4)}
.hud-kills-label{font-size:0.6rem;color:#f9a8d4;letter-spacing:1px}

/* ===== KILL FEED ===== */
#killFeed{position:fixed;top:80px;right:15px;z-index:55;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.kill-msg{background:rgba(10,4,30,0.9);border:1px solid rgba(236,72,153,0.3);border-radius:8px;padding:6px 12px;font-size:0.75rem;color:#fda4af;animation:killSlide 0.4s ease-out;white-space:nowrap;backdrop-filter:blur(4px)}
@keyframes killSlide{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== ABILITY COOLDOWN ===== */
#abilityHud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:55;display:none;flex-direction:row;gap:12px;pointer-events:none}
.ability-slot{width:60px;height:60px;background:rgba(10,4,30,0.85);border:2px solid rgba(139,92,246,0.4);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;backdrop-filter:blur(4px)}
.ability-icon{font-size:1.4rem}
.ability-key{font-size:0.55rem;color:#a78bfa;font-weight:700;letter-spacing:1px;margin-top:2px}
.ability-cd{position:absolute;inset:0;background:rgba(0,0,0,0.7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:#f472b6}

/* ===== MOBILE CONTROLS ===== */
#mobileControls{position:fixed;bottom:0;left:0;width:100%;z-index:60;display:none;padding:16px;pointer-events:none}
.mob-row{display:flex;justify-content:space-between;align-items:flex-end}
.mob-joystick{width:120px;height:120px;background:rgba(139,92,246,0.12);border:2px solid rgba(139,92,246,0.3);border-radius:50%;position:relative;pointer-events:auto;touch-action:none}
.mob-knob{width:46px;height:46px;background:radial-gradient(circle,#c084fc,#8b5cf6);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(192,132,252,0.5)}
.mob-btns{display:flex;flex-direction:column;gap:10px;pointer-events:auto}
.mob-btn{width:56px;height:56px;border-radius:50%;border:2px solid;font-size:1.2rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mob-attack{background:rgba(244,114,182,0.3);border-color:#f472b6;color:#f472b6}
.mob-special{background:rgba(56,189,248,0.3);border-color:#38bdf8;color:#38bdf8}
.mob-dash{background:rgba(251,191,36,0.3);border-color:#fbbf24;color:#fbbf24}

/* ===== OVERLAYS ===== */
#gameOver{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(8,4,24,0.95);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;backdrop-filter:blur(6px)}
#gameOver.active{display:flex}
.go-crown{font-size:5rem;animation:crownBounce 1s ease-in-out infinite}
@keyframes crownBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-15px) rotate(5deg)}}
.go-title{font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:3px}
.go-winner{background:linear-gradient(135deg,#f472b6,#c084fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.go-loser{background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.go-stats{color:#a78bfa;font-size:1.1rem;text-align:center;line-height:2}
.go-btn{background:linear-gradient(135deg,#8b5cf6,#c084fc,#ec4899);border:none;color:white;padding:0.9rem 3rem;font-size:1.1rem;font-weight:700;border-radius:50px;cursor:pointer;letter-spacing:1px;transition:all 0.3s;font-family:'Orbitron',sans-serif}
.go-btn:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(139,92,246,0.5)}
.go-btn.secondary{background:rgba(139,92,246,0.2);border:2px solid #8b5cf6}

/* ===== WINNER BANNER ===== */
.go-winner-banner{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(139,92,246,0.25),rgba(236,72,153,0.2));border:2px solid rgba(192,132,252,0.5);border-radius:20px;padding:16px 28px;margin-bottom:0.5rem}
.go-winner-avatar{width:64px;height:64px;border-radius:50%;border:3px solid #c084fc;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:linear-gradient(135deg,rgba(139,92,246,0.4),rgba(236,72,153,0.3))}
.go-winner-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.go-winner-info{text-align:left}
.go-winner-label{font-size:0.7rem;color:#a78bfa;text-transform:uppercase;letter-spacing:2px}
.go-winner-name{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,#f472b6,#c084fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ===== LEADERBOARD ===== */
.go-leaderboard{width:100%;max-width:420px;margin-top:0.5rem;max-height:260px;overflow-y:auto}
.go-leaderboard::-webkit-scrollbar{width:4px}
.go-leaderboard::-webkit-scrollbar-thumb{background:#8b5cf6;border-radius:2px}
.go-lb-title{font-family:'Orbitron',sans-serif;font-size:0.9rem;color:#c084fc;letter-spacing:2px;text-align:center;margin-bottom:8px}
.go-lb-row{display:flex;align-items:center;gap:10px;padding:6px 12px;border-radius:10px;margin-bottom:4px;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.15);transition:background 0.2s}
.go-lb-row.is-player{background:rgba(192,132,252,0.2);border-color:rgba(192,132,252,0.5)}
.go-lb-row.top1{background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(245,158,11,0.1));border-color:rgba(251,191,36,0.4)}
.go-lb-row.top2{background:linear-gradient(135deg,rgba(148,163,184,0.12),rgba(100,116,139,0.08));border-color:rgba(148,163,184,0.3)}
.go-lb-row.top3{background:linear-gradient(135deg,rgba(217,119,6,0.12),rgba(180,83,9,0.08));border-color:rgba(217,119,6,0.3)}
.go-lb-rank{font-family:'Orbitron',sans-serif;font-size:0.8rem;font-weight:700;width:28px;text-align:center}
.go-lb-rank.r1{color:#fbbf24}
.go-lb-rank.r2{color:#94a3b8}
.go-lb-rank.r3{color:#d97706}
.go-lb-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1rem;background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(236,72,153,0.2));border:1.5px solid rgba(192,132,252,0.3);flex-shrink:0}
.go-lb-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.go-lb-name{flex:1;font-size:0.78rem;font-weight:600;color:#e2e8f0}
.go-lb-kills{font-family:'Orbitron',sans-serif;font-size:0.75rem;font-weight:700;color:#f472b6}
.go-lb-status{font-size:0.6rem;color:#a78bfa;width:48px;text-align:right}

/* ===== DAMAGE FLASH ===== */
#dmgFlash{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,transparent 30%,rgba(244,63,94,0.4));z-index:45;pointer-events:none;opacity:0;transition:opacity 0.15s}

.watermark{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(192,132,252,0.15);font-size:0.65rem;letter-spacing:3px;z-index:10;pointer-events:none;font-family:'Orbitron',sans-serif}

@media(max-width:768px){
.cs-title{font-size:1.8rem}
.cs-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.cs-card{padding:8px 5px}
.cs-avatar{width:45px;height:45px;font-size:1.5rem}
.cs-name{font-size:0.75rem}
.cs-start{padding:0.8rem 2.5rem;font-size:1rem}
.hud-alive{font-size:1.2rem}
}
</style>
</head>
<body>

<!-- CHARACTER SELECT -->
<div id="charSelect">
<div class="cs-title">⚔️ ARENA KNOCKOUT 3D</div>
<div class="cs-sub">Choose Your Fighter • Last One Standing Wins</div>
<div class="cs-grid" id="csGrid"></div>
<button class="cs-start" id="csStart" disabled>SELECT A FIGHTER</button>
</div>

<!-- HUD -->
<div id="hud">
<div class="hud-top">
<div class="hud-player">
<div class="hud-avatar" id="hudAvatar">⚡</div>
<div class="hud-info">
<div class="hud-name" id="hudName">Player</div>
<div class="hud-bar-bg"><div class="hud-bar-fill" id="hudHP" style="width:100%"></div></div>
</div>
</div>
<div class="hud-center">

<div class="hud-kills">

</div>
</div>
</div>
<div id="killFeed"></div>
<div id="abilityHud">
<div class="ability-slot"><div class="ability-icon">⚔️</div><div class="ability-key">CLICK</div></div>
<div class="ability-slot" id="specialSlot"><div class="ability-icon">💥</div><div class="ability-key">SPACE</div></div>
<div class="ability-slot" id="dashSlot"><div class="ability-icon">💨</div><div class="ability-key">SHIFT</div></div>
</div>

<!-- MOBILE -->
<div id="mobileControls">
<div class="mob-row">
<div class="mob-joystick" id="joyArea"><div class="mob-knob" id="joyKnob"></div></div>
<div class="mob-btns">
<button class="mob-btn mob-attack" id="mobAtk">⚔️</button>
<button class="mob-btn mob-special" id="mobSpec">💥</button>
<button class="mob-btn mob-dash" id="mobDash">💨</button>
</div>
</div>
</div>

<div id="dmgFlash"></div>

<!-- GAME OVER -->
<div id="gameOver">
<div class="go-crown" id="goCrown">👑</div>
<div class="go-title" id="goTitle">VICTORY ROYALE</div>
<div class="go-stats" id="goStats"></div>
<button class="go-btn" onclick="location.reload()">🔄 PLAY AGAIN</button>
<button class="go-btn secondary" onclick="location.href='games.html'" style="margin-top:0.5rem">🔙 BACK TO GAMES</button>
</div>

<div class="watermark">🍡 MARS MELLOW GC — ARENA KNOCKOUT 3D</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq,dur,type='sine',vol=0.08){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.frequency.value=freq;o.type=type;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxHit(){playTone(180,0.2,'sawtooth',0.12);playTone(90,0.1,'square',0.06)}
function sfxKO(){[600,800,1000,1200].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'sine',0.1),i*80))}
function sfxDash(){playTone(400,0.1,'sine',0.06);playTone(600,0.08,'sine',0.04)}
function sfxSpecial(){playTone(300,0.3,'sawtooth',0.1);setTimeout(()=>playTone(500,0.2,'sine',0.08),100)}
function sfxWin(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.4,'sine',0.12),i*180))}
function sfxLose(){[400,350,300,200].forEach((f,i)=>setTimeout(()=>playTone(f,0.35,'sawtooth',0.1),i*200))}

// ========== CHARACTER SELECT ==========
function buildCharSelect(){
  const grid = document.getElementById('csGrid');
  ALL_PLAYERS.forEach((p,i) => {
    const card = document.createElement('div');
    card.className = 'cs-card';
    card.innerHTML = `
      <div class="cs-avatar">${p.img ? `<img src="${p.img}" alt="${p.name}">` : p.emoji}</div>
      <div class="cs-name">${p.name}</div>
      <div class="cs-stats">
        <div class="cs-stat">⚔${p.atk}</div>
        <div class="cs-stat">🛡${p.def}</div>
        <div class="cs-stat">💨${p.spd}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.cs-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      selectedIdx = i;
      const btn = document.getElementById('csStart');
      btn.disabled = false;
      btn.textContent = `⚔️ FIGHT AS ${p.name.toUpperCase()}`;
    });
    grid.appendChild(card);
  });
}

// ========== 3D INIT ==========
function initGame(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080418);
  scene.fog = new THREE.FogExp2(0x080418, 0.008);
  
  camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 500);
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);
  clock = new THREE.Clock();

  // Lights
  const ambient = new THREE.AmbientLight(0x6644aa, 0.8);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xc084fc, 1.2);
  dirLight.position.set(30, 50, 20);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(512,512);
  dirLight.shadow.camera.near = 1; dirLight.shadow.camera.far = 120;
  dirLight.shadow.camera.left = -50; dirLight.shadow.camera.right = 50;
  dirLight.shadow.camera.top = 50; dirLight.shadow.camera.bottom = -50;
  scene.add(dirLight);
  
  const hemiLight = new THREE.HemisphereLight(0xc084fc, 0x1a0a3e, 0.6);
  scene.add(hemiLight);

  // Neon rim lights
  const rimLight1 = new THREE.PointLight(0xec4899, 2, 80);
  rimLight1.position.set(-30, 10, -30);
  scene.add(rimLight1);
  const rimLight2 = new THREE.PointLight(0x38bdf8, 2, 80);
  rimLight2.position.set(30, 10, 30);
  scene.add(rimLight2);

  buildArena();
  spawnFighters();
  setupControls();

  if(isMobile){
    document.getElementById('mobileControls').style.display = 'block';
    setupMobileControls();
  }
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ========== ARENA ==========
function buildArena(){
  // Main platform - glowing hexagonal arena
  const floorGeo = new THREE.CylinderGeometry(arenaRadius, arenaRadius+2, 2, 64);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x1a0a3e, metalness: 0.3, roughness: 0.4,
    emissive: 0x1a0a3e, emissiveIntensity: 0.3
  });
  arenaFloor = new THREE.Mesh(floorGeo, floorMat);
  arenaFloor.position.y = -1;
  arenaFloor.receiveShadow = true;
  scene.add(arenaFloor);

  // Glowing ring edge
  const ringGeo = new THREE.TorusGeometry(arenaRadius, 0.5, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({color: 0xc084fc, transparent:true, opacity:0.8});
  arenaRing = new THREE.Mesh(ringGeo, ringMat);
  arenaRing.rotation.x = -Math.PI/2;
  arenaRing.position.y = 0.1;
  scene.add(arenaRing);

  // Grid lines on floor
  for(let i = 0; i < 8; i++){
    const lineGeo = new THREE.PlaneGeometry(arenaRadius*2, 0.15);
    const lineMat = new THREE.MeshBasicMaterial({color:0x8b5cf6, transparent:true, opacity:0.15});
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI/2;
    line.rotation.z = (i/8)*Math.PI;
    line.position.y = 0.05;
    scene.add(line);
  }
  for(let r = 8; r <= arenaRadius; r += 8){
    const circGeo = new THREE.TorusGeometry(r, 0.08, 4, 48);
    const circMat = new THREE.MeshBasicMaterial({color:0x8b5cf6, transparent:true, opacity:0.12});
    const circ = new THREE.Mesh(circGeo, circMat);
    circ.rotation.x = -Math.PI/2;
    circ.position.y = 0.05;
    scene.add(circ);
  }

  // Outer danger zone visual
  arenaGlow = new THREE.Mesh(
    new THREE.TorusGeometry(arenaRadius+1, 3, 8, 64),
    new THREE.MeshBasicMaterial({color:0xec4899, transparent:true, opacity:0.15})
  );
  arenaGlow.rotation.x = -Math.PI/2;
  arenaGlow.position.y = 0.5;
  scene.add(arenaGlow);

  // Floating crystals around arena
  crystals = [];
  const sharedCrystalGeo = new THREE.OctahedronGeometry(1.5, 0);
  for(let i = 0; i < 12; i++){
    const ang = (i/12) * Math.PI*2;
    const crystalMat = new THREE.MeshStandardMaterial({
      color: [0x8b5cf6,0xec4899,0x38bdf8,0xfbbf24][i%4],
      emissive: [0x8b5cf6,0xec4899,0x38bdf8,0xfbbf24][i%4],
      emissiveIntensity: 0.5, metalness:0.8, roughness:0.2
    });
    const crystal = new THREE.Mesh(sharedCrystalGeo, crystalMat);
    crystal.position.set(Math.cos(ang)*(arenaRadius+6), 5+Math.sin(i)*2, Math.sin(ang)*(arenaRadius+6));
    crystal.userData.baseY = crystal.position.y;
    crystal.userData.phase = i;
    scene.add(crystal);
    crystals.push(crystal);
  }

  // Skybox particles (stars)
  const starGeo = new THREE.BufferGeometry();
  const starPos = [];
  for(let i = 0; i < 800; i++){
    starPos.push((Math.random()-0.5)*400, Math.random()*150+10, (Math.random()-0.5)*400);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({color:0xc084fc, size:0.5, transparent:true, opacity:0.6});
  scene.add(new THREE.Points(starGeo, starMat));
}

// ========== FIGHTERS ==========
const _sharedHeadGeo = new THREE.SphereGeometry(0.5, 8, 6);
const _sharedHeadMat = new THREE.MeshStandardMaterial({color:0xfce4b8, metalness:0.1, roughness:0.6});
const _sharedEyeGeo = new THREE.SphereGeometry(0.08, 6, 4);
const _sharedEyeMat = new THREE.MeshBasicMaterial({color:0xffffff});
const _sharedHpBgMat = new THREE.MeshBasicMaterial({color:0x111111, transparent:true, opacity:0.7});
const _sharedBodyGeo = new THREE.CapsuleGeometry(0.6, 1.2, 3, 6);
const _sharedHairGeo = new THREE.SphereGeometry(0.55, 8, 6, 0, Math.PI*2, 0, Math.PI/2);
const MAX_PARTICLES = 80;

function createFighterMesh(p, isPlayer){
  const group = new THREE.Group();
  
  // Body
  const bodyMat = new THREE.MeshStandardMaterial({
    color: p.color, metalness:0.4, roughness:0.3,
    emissive: p.color, emissiveIntensity: isPlayer ? 0.5 : 0.3
  });
  const body = new THREE.Mesh(_sharedBodyGeo, bodyMat);
  body.position.y = 1.5;
  group.add(body);

  // Head
  const head = new THREE.Mesh(_sharedHeadGeo, _sharedHeadMat);
  head.position.y = 2.8;
  group.add(head);

  // Hair/accessory glow
  const hairMat = new THREE.MeshStandardMaterial({
    color: p.color, emissive: p.color, emissiveIntensity:0.3
  });
  const hair = new THREE.Mesh(_sharedHairGeo, hairMat);
  hair.position.y = 2.9;
  group.add(hair);

  // Eyes (anime style)
  const pupilMat = new THREE.MeshBasicMaterial({color: p.color});
  [-0.18, 0.18].forEach(xOff => {
    const eye = new THREE.Mesh(_sharedEyeGeo, _sharedEyeMat);
    eye.position.set(xOff, 2.85, 0.42);
    group.add(eye);
    const pupil = new THREE.Mesh(_sharedEyeGeo, pupilMat);
    pupil.position.set(xOff, 2.85, 0.47);
    group.add(pupil);
  });

  // Aura ring (player only)
  if(isPlayer){
    const auraGeo = new THREE.TorusGeometry(1.2, 0.1, 8, 32);
    const auraMat = new THREE.MeshBasicMaterial({color: p.color, transparent:true, opacity:0.5});
    const aura = new THREE.Mesh(auraGeo, auraMat);
    aura.rotation.x = -Math.PI/2;
    aura.position.y = 0.1;
    group.add(aura);
    group.userData.aura = aura;
  }

  // Name label (sprite)
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 28px Poppins, Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = `#${p.color.toString(16).padStart(6,'0')}`;
  ctx.shadowBlur = 10;
  ctx.fillText(p.name, 128, 35);
  const tex = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false});
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.y = 3.8;
  sprite.scale.set(3, 0.75, 1);
  group.add(sprite);

  // HP bar background
  const hpBgGeo = new THREE.PlaneGeometry(1.6, 0.18);
  const hpBg = new THREE.Mesh(hpBgGeo, _sharedHpBgMat);
  hpBg.position.y = 3.5;
  hpBg.lookAt(new THREE.Vector3(hpBg.position.x, hpBg.position.y, hpBg.position.z+1));
  group.add(hpBg);
  group.userData.hpBg = hpBg;

  // HP bar fill
  const hpGeo = new THREE.PlaneGeometry(1.5, 0.12);
  const hpMat = new THREE.MeshBasicMaterial({color: isPlayer ? 0xc084fc : 0x22d3ee});
  const hpMesh = new THREE.Mesh(hpGeo, hpMat);
  hpMesh.position.y = 3.5;
  hpMesh.position.z = 0.01;
  group.add(hpMesh);
  group.userData.hpMesh = hpMesh;
  group.userData.hpFullWidth = 1.5;

  return group;
}

function spawnFighters(){
  fighters = [];
  ALL_PLAYERS.forEach((p, i) => {
    const isPlayer = (i === selectedIdx);
    const mesh = createFighterMesh(p, isPlayer);
    const angle = (i / ALL_PLAYERS.length) * Math.PI * 2;
    const radius = 15 + Math.random() * 10;
    mesh.position.set(Math.cos(angle)*radius, 0, Math.sin(angle)*radius);
    mesh.rotation.y = angle + Math.PI;
    scene.add(mesh);
    
    const baseHP = 80 + p.def * 8;
    const f = {
      mesh, data: p, isPlayer, alive: true,
      hp: baseHP, maxHp: baseHP,
      vx: 0, vz: 0, // velocity for knockback
      speed: 0.06 + p.spd * 0.008,
      atkPow: 5 + p.atk * 3,
      atkRange: 3.5,
      aiTimer: Math.random()*3,
      aiTarget: null,
      stunTimer: 0,
      dashTimer: 0,
      attackAnim: 0,
      idx: i
    };
    fighters.push(f);
    if(isPlayer) playerFighter = f;
  });
}

// ========== CONTROLS ==========
function setupControls(){
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'Space' && gameActive) doSpecial();
    if(e.code === 'ShiftLeft' && gameActive) doDash();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
  
  renderer.domElement.addEventListener('mousedown', e => {
    if(gameActive && e.button === 0) doAttack();
  });
  renderer.domElement.addEventListener('mousemove', e => {
    if(gameActive){
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    }
  });
  // Camera rotation with right mouse or drag
  let dragging = false, dragStartX = 0;
  renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
  renderer.domElement.addEventListener('mousedown', e => {
    if(e.button === 2){ dragging = true; dragStartX = e.clientX; }
  });
  document.addEventListener('mousemove', e => {
    if(dragging){ cameraAngle -= (e.clientX - dragStartX) * 0.008; dragStartX = e.clientX; }
  });
  document.addEventListener('mouseup', e => { if(e.button === 2) dragging = false; });
  // Scroll zoom
  renderer.domElement.addEventListener('wheel', e => {
    cameraDist = Math.max(8, Math.min(30, cameraDist + e.deltaY * 0.02));
  });
}

function setupMobileControls(){
  const area = document.getElementById('joyArea');
  const knob = document.getElementById('joyKnob');
  const rect = ()=>area.getBoundingClientRect();

  area.addEventListener('touchstart', e => {
    e.preventDefault(); joystickData.active = true;
    updateJoy(e.touches[0], rect());
  }, {passive:false});
  area.addEventListener('touchmove', e => {
    e.preventDefault(); if(joystickData.active) updateJoy(e.touches[0], rect());
  }, {passive:false});
  area.addEventListener('touchend', () => {
    joystickData.active = false; joystickData.dx = 0; joystickData.dy = 0;
    knob.style.transform = 'translate(-50%,-50%)';
  });
  function updateJoy(t, r){
    let dx=(t.clientX-r.left-r.width/2)/(r.width/2);
    let dy=(t.clientY-r.top-r.height/2)/(r.height/2);
    let len=Math.sqrt(dx*dx+dy*dy);if(len>1){dx/=len;dy/=len;}
    joystickData.dx=dx; joystickData.dy=dy;
    knob.style.transform=`translate(calc(-50% + ${dx*30}px),calc(-50% + ${dy*30}px))`;
  }

  // Camera rotation via touch on canvas
  renderer.domElement.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    if(t.clientX > window.innerWidth * 0.35){
      touchRotate.active = true; touchRotate.lastX = t.clientX;
    }
  }, {passive:false});
  renderer.domElement.addEventListener('touchmove', e => {
    if(touchRotate.active){
      const t = e.changedTouches[0];
      cameraAngle -= (t.clientX - touchRotate.lastX) * 0.006;
      touchRotate.lastX = t.clientX;
    }
  }, {passive:false});
  renderer.domElement.addEventListener('touchend', () => { touchRotate.active = false; });

  document.getElementById('mobAtk').addEventListener('touchstart', e => { e.preventDefault(); doAttack(); });
  document.getElementById('mobSpec').addEventListener('touchstart', e => { e.preventDefault(); doSpecial(); });
  document.getElementById('mobDash').addEventListener('touchstart', e => { e.preventDefault(); doDash(); });
}

// ========== ACTIONS ==========
function doAttack(){
  if(!playerFighter || !playerFighter.alive || attackCooldown > 0) return;
  attackCooldown = 0.4;
  playerFighter.attackAnim = 0.3;
  sfxHit();
  
  // Attack nearest enemy in range
  let nearest = null, nearDist = playerFighter.atkRange;
  const px = playerFighter.mesh.position.x, pz = playerFighter.mesh.position.z;
  fighters.forEach(f => {
    if(f === playerFighter || !f.alive) return;
    const d = Math.sqrt((px-f.mesh.position.x)**2 + (pz-f.mesh.position.z)**2);
    if(d < nearDist){ nearDist = d; nearest = f; }
  });
  if(nearest){
    dealDamage(playerFighter, nearest, playerFighter.atkPow);
    spawnHitParticles(nearest.mesh.position.x, 2, nearest.mesh.position.z, playerFighter.data.color);
    shakeAmount = 0.3;
  }
}

function doSpecial(){
  if(!playerFighter || !playerFighter.alive || specialCooldown > 0) return;
  specialCooldown = 5;
  sfxSpecial();
  playerFighter.attackAnim = 0.5;
  
  // AOE attack
  const px = playerFighter.mesh.position.x, pz = playerFighter.mesh.position.z;
  const range = 6;
  fighters.forEach(f => {
    if(f === playerFighter || !f.alive) return;
    const d = Math.sqrt((px-f.mesh.position.x)**2 + (pz-f.mesh.position.z)**2);
    if(d < range){
      dealDamage(playerFighter, f, playerFighter.atkPow * 1.8);
      // Extra knockback
      const ang = Math.atan2(f.mesh.position.z-pz, f.mesh.position.x-px);
      f.vx += Math.cos(ang) * 0.8;
      f.vz += Math.sin(ang) * 0.8;
      spawnHitParticles(f.mesh.position.x, 2, f.mesh.position.z, 0xfbbf24);
    }
  });
  // AOE ring visual
  spawnAOERing(px, pz, range, playerFighter.data.color);
  shakeAmount = 0.6;
}

function doDash(){
  if(!playerFighter || !playerFighter.alive || dashCooldown > 0) return;
  dashCooldown = 2;
  sfxDash();
  
  let dx = 0, dz = 0;
  if(isMobile){
    dx = joystickData.dx; dz = joystickData.dy;
  } else {
    if(keys['KeyW']) dz = -1; if(keys['KeyS']) dz = 1;
    if(keys['KeyA']) dx = -1; if(keys['KeyD']) dx = 1;
  }
  if(dx === 0 && dz === 0){
    // Dash forward relative to camera
    dx = -Math.sin(cameraAngle); dz = -Math.cos(cameraAngle);
  }
  const len = Math.sqrt(dx*dx+dz*dz)||1;
  playerFighter.vx += (dx/len) * 1.2;
  playerFighter.vz += (dz/len) * 1.2;
  playerFighter.dashTimer = 0.3;
  
  // Dash trail
  for(let i = 0; i < 8; i++){
    spawnParticle(
      playerFighter.mesh.position.x + (Math.random()-0.5)*2,
      1 + Math.random()*2,
      playerFighter.mesh.position.z + (Math.random()-0.5)*2,
      playerFighter.data.color, 0.6
    );
  }
}

function dealDamage(attacker, target, amount){
  target.hp -= amount;
  target.stunTimer = 0.3;
  
  // Knockback
  const dx = target.mesh.position.x - attacker.mesh.position.x;
  const dz = target.mesh.position.z - attacker.mesh.position.z;
  const dist = Math.sqrt(dx*dx+dz*dz) || 1;
  const kb = amount * 0.02;
  target.vx += (dx/dist) * kb;
  target.vz += (dz/dist) * kb;
  
  if(target.isPlayer){
    document.getElementById('dmgFlash').style.opacity = '0.6';
    setTimeout(()=>document.getElementById('dmgFlash').style.opacity='0', 150);
  }
  
  if(target.hp <= 0){
    eliminateFighter(attacker, target);
  }
}

function eliminateFighter(killer, target){
  target.alive = false;
  target.mesh.visible = false;
  aliveCount--;
  
  sfxKO();
  spawnEliminationEffect(target.mesh.position.x, 2, target.mesh.position.z, target.data.color);
  
  if(killer.isPlayer) killCount++;
  // Track kills per fighter
  if(!fighterKills[killer.data.name]) fighterKills[killer.data.name] = 0;
  fighterKills[killer.data.name]++;
  // Track elimination order
  eliminationOrder.push(target.data.name);
  
  addKillMessage(killer.data.name, target.data.name);
  
  if(target.isPlayer){
    setTimeout(() => endGame(false), 1000);
  } else if(aliveCount <= 1){
    setTimeout(() => endGame(true), 1000);
  }
}

// ========== PARTICLES ==========
function ensureSharedGeo(){
  if(!sharedGeo.sphere){
    sharedGeo.sphere = new THREE.SphereGeometry(0.15, 4, 4);
    sharedGeo.octa = new THREE.OctahedronGeometry(0.15, 0);
    sharedGeo.octaLg = new THREE.OctahedronGeometry(0.25, 0);
    sharedGeo.torus = new THREE.TorusGeometry(0.5, 0.15, 4, 32);
  }
}

function spawnParticle(x,y,z,color,life){
  if(particles.length >= MAX_PARTICLES) return;
  ensureSharedGeo();
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:1});
  const mesh = new THREE.Mesh(sharedGeo.sphere, mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);
  particles.push({
    mesh, life, maxLife:life,
    vx:(Math.random()-0.5)*0.2, vy:Math.random()*0.15, vz:(Math.random()-0.5)*0.2
  });
}

function spawnHitParticles(x,y,z,color){
  if(particles.length >= MAX_PARTICLES) return;
  ensureSharedGeo();
  for(let i=0;i<5;i++){
    const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:1});
    const mesh = new THREE.Mesh(sharedGeo.octa, mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);
    const a = Math.random()*Math.PI*2, sp = 0.2+Math.random()*0.3;
    particles.push({
      mesh, life:0.5+Math.random()*0.3, maxLife:0.8,
      vx:Math.cos(a)*sp, vy:0.1+Math.random()*0.2, vz:Math.sin(a)*sp
    });
  }
}

function spawnEliminationEffect(x,y,z,color){
  ensureSharedGeo();
  for(let i=0;i<8;i++){
    const mat = new THREE.MeshBasicMaterial({
      color: i%2===0 ? color : 0xffffff, transparent:true, opacity:1
    });
    const mesh = new THREE.Mesh(sharedGeo.octaLg, mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);
    const a = Math.random()*Math.PI*2, sp = 0.3+Math.random()*0.5;
    particles.push({
      mesh, life:1+Math.random()*0.5, maxLife:1.5,
      vx:Math.cos(a)*sp, vy:0.2+Math.random()*0.4, vz:Math.sin(a)*sp
    });
  }
  // Ring burst
  spawnAOERing(x, z, 4, color);
}

function spawnAOERing(x, z, radius, color){
  ensureSharedGeo();
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.8});
  const mesh = new THREE.Mesh(sharedGeo.torus, mat);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set(x, 0.3, z);
  scene.add(mesh);
  particles.push({
    mesh, life:0.6, maxLife:0.6,
    vx:0, vy:0, vz:0,
    isRing:true, targetScale:radius/0.5
  });
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= dt;
    if(p.life <= 0){
      scene.remove(p.mesh);
      if(p.mesh.material) p.mesh.material.dispose();
      particles.splice(i,1);
      continue;
    }
    const t = p.life / p.maxLife;
    p.mesh.material.opacity = t;
    if(p.isRing){
      const s = 1 + (1-t) * p.targetScale;
      p.mesh.scale.set(s, s, s);
    } else {
      p.mesh.position.x += p.vx;
      p.mesh.position.y += p.vy;
      p.mesh.position.z += p.vz;
      p.vy -= 0.008;
    }
  }
}

// ========== AI ==========
function updateAI(f, dt){
  if(!f.alive || f.isPlayer || f.stunTimer > 0) return;
  
  f.aiTimer -= dt;
  if(f.aiTimer <= 0 || !f.aiTarget || !f.aiTarget.alive){
    // Pick target
    let best = null, bestDist = 999;
    fighters.forEach(t => {
      if(t === f || !t.alive) return;
      const d = Math.sqrt((f.mesh.position.x-t.mesh.position.x)**2+(f.mesh.position.z-t.mesh.position.z)**2);
      // Prefer nearby, prefer player sometimes
      const bias = t.isPlayer ? 0.7 : 1;
      if(d*bias < bestDist){ bestDist = d*bias; best = t; }
    });
    f.aiTarget = best;
    f.aiTimer = 2 + Math.random()*2;
  }
  
  if(!f.aiTarget) return;
  
  const tx = f.aiTarget.mesh.position.x;
  const tz = f.aiTarget.mesh.position.z;
  const dx = tx - f.mesh.position.x;
  const dz = tz - f.mesh.position.z;
  const dist = Math.sqrt(dx*dx + dz*dz) || 1;
  
  if(dist < f.atkRange){
    // Attack
    if(Math.random() < 0.03){
      dealDamage(f, f.aiTarget, f.atkPow * (0.6+Math.random()*0.4));
      spawnHitParticles(f.aiTarget.mesh.position.x, 2, f.aiTarget.mesh.position.z, f.data.color);
      f.attackAnim = 0.3;
      sfxHit();
    }
    // Sometimes dodge
    if(Math.random() < 0.005){
      const perpAng = Math.atan2(dz, dx) + (Math.random()>0.5?1:-1)*Math.PI/2;
      f.vx += Math.cos(perpAng)*0.5;
      f.vz += Math.sin(perpAng)*0.5;
    }
  } else {
    // Move toward target
    f.mesh.position.x += (dx/dist) * f.speed;
    f.mesh.position.z += (dz/dist) * f.speed;
  }
  
  // Face target
  f.mesh.rotation.y = Math.atan2(dx, dz);
  
  // Stay in arena
  const centerDist = Math.sqrt(f.mesh.position.x**2 + f.mesh.position.z**2);
  if(centerDist > arenaRadius - 3){
    const ang = Math.atan2(f.mesh.position.z, f.mesh.position.x);
    f.mesh.position.x -= Math.cos(ang) * 0.1;
    f.mesh.position.z -= Math.sin(ang) * 0.1;
  }
}

// ========== PLAYER MOVEMENT ==========
function movePlayer(dt){
  if(!playerFighter || !playerFighter.alive || playerFighter.stunTimer > 0) return;
  
  let dx = 0, dz = 0;
  if(isMobile){
    dx = joystickData.dx; dz = joystickData.dy;
  } else {
    if(keys['KeyW'] || keys['ArrowUp']) dz = -1;
    if(keys['KeyS'] || keys['ArrowDown']) dz = 1;
    if(keys['KeyA'] || keys['ArrowLeft']) dx = -1;
    if(keys['KeyD'] || keys['ArrowRight']) dx = 1;
  }
  
  if(dx === 0 && dz === 0) return;
  
  const len = Math.sqrt(dx*dx+dz*dz);
  dx/=len; dz/=len;
  
  // Relative to camera
  const sin = Math.sin(cameraAngle), cos = Math.cos(cameraAngle);
  const mx = dx*cos - dz*sin;
  const mz = dx*sin + dz*cos;
  
  playerFighter.mesh.position.x += mx * playerFighter.speed;
  playerFighter.mesh.position.z += mz * playerFighter.speed;
  
  // Face movement direction
  playerFighter.mesh.rotation.y = Math.atan2(mx, mz);
}

// ========== UPDATE FIGHTERS ==========
function updateFighters(dt){
  fighters.forEach(f => {
    if(!f.alive) return;
    
    // Apply velocity (knockback/dash)
    f.mesh.position.x += f.vx;
    f.mesh.position.z += f.vz;
    f.vx *= 0.9; f.vz *= 0.9;
    
    // Stun timer
    if(f.stunTimer > 0) f.stunTimer -= dt;
    if(f.dashTimer > 0) f.dashTimer -= dt;
    if(f.attackAnim > 0){
      f.attackAnim -= dt;
      // Punch animation - scale body
      const s = 1 + Math.sin(f.attackAnim*20)*0.15;
      f.mesh.children[0].scale.set(s, 1, s);
    } else {
      f.mesh.children[0].scale.set(1,1,1);
    }
    
    // Bobbing animation
    const bob = Math.sin(frameTime*0.004+f.idx)*0.1;
    f.mesh.children[0].position.y = 1.5 + bob;
    f.mesh.children[1].position.y = 2.8 + bob;
    
    // HP bar face camera (only update for nearby fighters to save perf)
    if(f.mesh.userData.hpBg){
      const camDx = f.mesh.position.x - camera.position.x;
      const camDz = f.mesh.position.z - camera.position.z;
      if(camDx*camDx + camDz*camDz < 900){
        f.mesh.userData.hpBg.lookAt(camera.position);
        f.mesh.userData.hpMesh.lookAt(camera.position);
      }
      const hpPct = Math.max(0, f.hp / f.maxHp);
      f.mesh.userData.hpMesh.scale.x = hpPct;
      f.mesh.userData.hpMesh.position.x = -(1-hpPct)*f.mesh.userData.hpFullWidth*0.5;
      if(hpPct < 0.3) f.mesh.userData.hpMesh.material.color.setHex(0xef4444);
      else if(hpPct < 0.6) f.mesh.userData.hpMesh.material.color.setHex(0xfbbf24);
    }
    
    // Player aura rotation
    if(f.isPlayer && f.mesh.userData.aura){
      f.mesh.userData.aura.rotation.z += dt * 2;
    }
    
    // Fall off arena = eliminated
    const cDistSq = f.mesh.position.x**2 + f.mesh.position.z**2;
    const centerDist = Math.sqrt(cDistSq);
    if(centerDist > arenaRadius + 2){
      if(f.alive){
        let pusher = f;
        const fxp = f.mesh.position.x, fzp = f.mesh.position.z;
        for(let j=0;j<fighters.length;j++){
          const o = fighters[j];
          if(o === f || !o.alive) continue;
          const odx = o.mesh.position.x-fxp, odz = o.mesh.position.z-fzp;
          if(odx*odx+odz*odz < 64){ pusher = o; break; }
        }
        eliminateFighter(pusher, f);
      }
    }
    
    // Push damage near edge during shrink
    if(centerDist > arenaRadius - 2 && centerDist <= arenaRadius + 2){
      f.hp -= dt * 8;
      if(f.hp <= 0 && f.alive){
        let pusher = f;
        eliminateFighter(pusher, f);
      }
      // Push toward center slightly
      const ang = Math.atan2(f.mesh.position.z, f.mesh.position.x);
      f.vx -= Math.cos(ang) * 0.02;
      f.vz -= Math.sin(ang) * 0.02;
    }
    
    // AI
    updateAI(f, dt);
  });
}

// ========== ARENA SHRINK ==========
function updateArena(dt){
  arenaShrinkTimer += dt;
  if(arenaShrinkTimer > arenaShrinkInterval && arenaRadius > arenaMinRadius){
    arenaRadius -= 0.03;
    arenaFloor.scale.x = arenaRadius/38;
    arenaFloor.scale.z = arenaRadius/38;
    arenaRing.scale.set(arenaRadius/38, arenaRadius/38, 1);
    arenaGlow.scale.set(arenaRadius/38, arenaRadius/38, 1);
    arenaGlow.material.opacity = 0.15 + (1-arenaRadius/38)*0.3;
    // Pulse ring when shrinking
    arenaRing.material.color.setHex(frameTime%400<200 ? 0xef4444 : 0xc084fc);
  } else {
    arenaRing.material.color.setHex(0xc084fc);
  }
  
  // Animate crystals
  for(let i=0;i<crystals.length;i++){
    const c = crystals[i];
    c.position.y = c.userData.baseY + Math.sin(frameTime*0.002+c.userData.phase)*1.5;
    c.rotation.y += dt * 0.5;
    c.rotation.x += dt * 0.3;
  }
}

// ========== HUD ==========
function updateHUD(){
  if(!playerFighter) return;
  document.getElementById('hudAlive').textContent = aliveCount;
  document.getElementById('hudKills').textContent = killCount;
  
  if(playerFighter.alive){
    const pct = Math.max(0, playerFighter.hp / playerFighter.maxHp)*100;
    document.getElementById('hudHP').style.width = pct+'%';
    if(pct < 30) document.getElementById('hudHP').style.background = 'linear-gradient(90deg,#ef4444,#f97316)';
    else if(pct < 60) document.getElementById('hudHP').style.background = 'linear-gradient(90deg,#fbbf24,#f59e0b)';
    else document.getElementById('hudHP').style.background = 'linear-gradient(90deg,#8b5cf6,#c084fc)';
  }
  
  // Cooldowns - only update DOM when state changes
  const curSpecialCD = Math.ceil(specialCooldown);
  if(curSpecialCD !== lastSpecialCD){
    lastSpecialCD = curSpecialCD;
    if(curSpecialCD > 0){
      document.getElementById('specialSlot').innerHTML = `<div class="ability-cd">${curSpecialCD}</div>`;
    } else {
      document.getElementById('specialSlot').innerHTML = '<div class="ability-icon">💥</div><div class="ability-key">SPACE</div>';
    }
  }
  const curDashCD = Math.ceil(dashCooldown);
  if(curDashCD !== lastDashCD){
    lastDashCD = curDashCD;
    if(curDashCD > 0){
      document.getElementById('dashSlot').innerHTML = `<div class="ability-cd">${curDashCD}</div>`;
    } else {
      document.getElementById('dashSlot').innerHTML = '<div class="ability-icon">💨</div><div class="ability-key">SHIFT</div>';
    }
  }
}

function addKillMessage(killer, victim){
  const feed = document.getElementById('killFeed');
  const msg = document.createElement('div');
  msg.className = 'kill-msg';
  msg.textContent = `⚔️ ${killer} eliminated ${victim}`;
  feed.appendChild(msg);
  setTimeout(() => { if(msg.parentNode) msg.remove(); }, 4000);
  while(feed.children.length > 5) feed.removeChild(feed.firstChild);
}

// ========== CAMERA ==========
function updateCamera(){
  if(!playerFighter) return;
  const target = playerFighter.mesh.position;
  
  // Auto-rotate camera slightly
  if(!keys['KeyA'] && !keys['KeyD'] && !keys['ArrowLeft'] && !keys['ArrowRight'] && !isMobile){
    // Q/E for camera rotation
    if(keys['KeyQ']) cameraAngle += 0.03;
    if(keys['KeyE']) cameraAngle -= 0.03;
  }
  
  const cx = target.x + Math.sin(cameraAngle) * cameraDist;
  const cz = target.z + Math.cos(cameraAngle) * cameraDist;
  
  if(!_tmpVec3.cam) _tmpVec3.cam = new THREE.Vector3();
  _tmpVec3.cam.set(cx, cameraHeight, cz);
  camera.position.lerp(_tmpVec3.cam, 0.08);
  
  // Screen shake
  if(shakeAmount > 0){
    camera.position.x += (Math.random()-0.5)*shakeAmount;
    camera.position.z += (Math.random()-0.5)*shakeAmount;
    shakeAmount *= 0.85;
    if(shakeAmount < 0.01) shakeAmount = 0;
  }
  
  camera.lookAt(target.x, 2, target.z);
}

// ========== GAME OVER ==========
function endGame(won){
  gameActive = false;
  document.getElementById('gameOver').classList.add('active');
  
  // Find the actual winner (last alive)
  const winner = fighters.find(f => f.alive);
  const winnerData = winner ? winner.data : playerFighter.data;
  
  if(won){
    document.getElementById('goCrown').textContent = '👑';
    document.getElementById('goTitle').textContent = 'VICTORY ROYALE!';
    document.getElementById('goTitle').className = 'go-title go-winner';
    sfxWin();
  } else {
    document.getElementById('goCrown').textContent = '💀';
    document.getElementById('goTitle').textContent = 'ELIMINATED';
    document.getElementById('goTitle').className = 'go-title go-loser';
    sfxLose();
  }
  
  // Winner banner
  const winnerAvatar = winnerData.img
    ? `<img src="${winnerData.img}" alt="${winnerData.name}">`
    : winnerData.emoji;
  const winnerBanner = `<div class="go-winner-banner">
    <div class="go-winner-avatar">${winnerAvatar}</div>
    <div class="go-winner-info">
      <div class="go-winner-label">🏆 GAME WINNER</div>
      <div class="go-winner-name">${winnerData.name}</div>
    </div>
  </div>`;
  
  const placement = won ? 1 : aliveCount;
  const statsHtml = `
    <div>🏆 Your Placement: #${placement} / ${ALL_PLAYERS.length}</div>
    <div>⚔️ Eliminations: ${killCount}</div>
    <div>🎮 Fighter: ${playerFighter.data.name}</div>
    <div>💥 Special: ${playerFighter.data.sp}</div>
  `;
  
  // Build leaderboard - rank by: alive first, then by kills, then by elimination order (later = better)
  const rankings = ALL_PLAYERS.map((p, i) => {
    const f = fighters[i];
    const kills = fighterKills[p.name] || 0;
    const elimIdx = eliminationOrder.indexOf(p.name);
    // alive fighters get rank by kills; eliminated by reverse elimination order
    const rank = f.alive ? 10000 + kills : (elimIdx >= 0 ? ALL_PLAYERS.length - elimIdx : 0);
    return { name: p.name, emoji: p.emoji, img: p.img, kills, alive: f.alive, isPlayer: f.isPlayer, score: rank };
  });
  rankings.sort((a, b) => b.score - a.score);
  
  let lbHtml = '<div class="go-leaderboard"><div class="go-lb-title">📊 LEADERBOARD</div>';
  rankings.forEach((r, i) => {
    const pos = i + 1;
    let rowClass = '';
    if(pos === 1) rowClass = 'top1';
    else if(pos === 2) rowClass = 'top2';
    else if(pos === 3) rowClass = 'top3';
    if(r.isPlayer) rowClass += ' is-player';
    
    let rankClass = '';
    if(pos === 1) rankClass = 'r1';
    else if(pos === 2) rankClass = 'r2';
    else if(pos === 3) rankClass = 'r3';
    
    const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : `#${pos}`;
    const avatarContent = r.img ? `<img src="${r.img}" alt="${r.name}">` : r.emoji;
    const status = r.alive ? '👑 ALIVE' : '💀';
    
    lbHtml += `<div class="go-lb-row ${rowClass}">
      <div class="go-lb-rank ${rankClass}">${medal}</div>
      <div class="go-lb-avatar">${avatarContent}</div>
      <div class="go-lb-name">${r.name}${r.isPlayer ? ' (YOU)' : ''}</div>
      <div class="go-lb-kills">⚔️${r.kills}</div>
      <div class="go-lb-status">${status}</div>
    </div>`;
  });
  lbHtml += '</div>';
  
  document.getElementById('goStats').innerHTML = winnerBanner + statsHtml + lbHtml;
}

// ========== MAIN LOOP ==========
function animate(){
  requestAnimationFrame(animate);
  if(!gameActive){ renderer.render(scene, camera); return; }
  
  const dt = Math.min(clock.getDelta(), 0.05);
  frameTime = performance.now();
  
  attackCooldown = Math.max(0, attackCooldown - dt);
  specialCooldown = Math.max(0, specialCooldown - dt);
  dashCooldown = Math.max(0, dashCooldown - dt);
  
  movePlayer(dt);
  updateFighters(dt);
  updateArena(dt);
  updateParticles(dt);
  updateCamera();
  updateHUD();
  
  renderer.render(scene, camera);
}

// ========== START ==========
buildCharSelect();

document.getElementById('csStart').addEventListener('click', () => {
  if(selectedIdx < 0) return;
  audioCtx.resume();
  
  document.getElementById('charSelect').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('abilityHud').style.display = 'flex';
  
  document.getElementById('hudName').textContent = ALL_PLAYERS[selectedIdx].name;
  const selP = ALL_PLAYERS[selectedIdx];
  document.getElementById('hudAvatar').innerHTML = selP.img ? `<img src="${selP.img}" alt="${selP.name}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : selP.emoji;
  
  initGame();
  gameActive = true;
  animate();
});
</script>
